apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: github-app
  template:
    metadata:
      labels:
        app: github-app
    spec:
      containers:
        - name: docker-jenkins-integration-sample
          image: docker-jenkins-integration-sample:latest
          ports:
            - containerPort: 8080

---

apiVersion: v1 # Kubernetes API version
kind: Service # Kubernetes resource kind we are creating
metadata: # Metadata of the resource kind we are creating
  name: github-svc
spec:
  selector:
    app: github-app
  ports:
    - protocol: "TCP"
      port: 8080 # The port that the service is running on in the cluster
      targetPort: 8080 # The port exposed by the service
  type: LoadBalancer # type of the service. # NodePort does not work in Kind